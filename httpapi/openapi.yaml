openapi: 3.0.3
info:
  title: fsearch API
  description: >-
    REST-обёртка над движком нечёткого поиска fsearch: управление списками и
    записями, а также нечёткий поиск с поддержкой русско-английской
    транслитерации (минимум 5 символов в запросе).
  version: 1.0.0
servers:
  - url: /
paths:
  {{ .List }}:
    get:
      summary: Список всех sysname
      operationId: listLists
      tags: [lists]
      responses:
        "200":
          description: Список идентификаторов
          content:
            application/json:
              schema:
                type: object
                properties:
                  lists:
                    type: array
                    items:
                      type: string
                example:
                  lists: [clients, products]
    post:
      summary: Создать список
      operationId: createList
      tags: [lists]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateListRequest"
      responses:
        "201":
          description: Список создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMeta"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  {{ .Item }}:
    parameters:
      - $ref: "#/components/parameters/Sysname"
    get:
      summary: Метаданные списка
      operationId: getList
      tags: [lists]
      responses:
        "200":
          description: Метаданные списка
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMeta"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Удалить список
      operationId: deleteList
      tags: [lists]
      responses:
        "204":
          description: Список удалён
        "404":
          $ref: "#/components/responses/NotFound"
  {{ .Records }}:
    parameters:
      - $ref: "#/components/parameters/Sysname"
    post:
      summary: Добавить запись или массив записей
      operationId: addRecords
      tags: [records]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/Record"
                - type: array
                  items:
                    $ref: "#/components/schemas/Record"
            examples:
              single:
                summary: Одна запись
                value: { name: "Иванов Иван", city: "Москва" }
              array:
                summary: Массив записей
                value:
                  - { name: "Иванов Иван", city: "Москва" }
                  - { name: "Петров Пётр", city: "Казань" }
      responses:
        "201":
          description: Запись(и) добавлены
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                  - type: object
                    properties:
                      ids:
                        type: array
                        items:
                          type: integer
                          format: int64
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  {{ .Record }}:
    parameters:
      - $ref: "#/components/parameters/Sysname"
      - $ref: "#/components/parameters/RecordID"
    get:
      summary: Получить запись по id
      operationId: getRecord
      tags: [records]
      responses:
        "200":
          description: Запись
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordEnvelope"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Обновить запись
      operationId: updateRecord
      tags: [records]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Record"
      responses:
        "200":
          description: Запись обновлена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Удалить запись
      operationId: deleteRecord
      tags: [records]
      responses:
        "204":
          description: Запись удалена
        "404":
          $ref: "#/components/responses/NotFound"
  {{ .Search }}:
    parameters:
      - $ref: "#/components/parameters/Sysname"
    get:
      summary: Нечёткий поиск
      operationId: search
      tags: [search]
      parameters:
        - name: field
          in: query
          required: true
          description: Поле, по которому выполняется поиск
          schema:
            type: string
        - name: q
          in: query
          required: true
          description: Поисковый запрос (минимум 5 символов)
          schema:
            type: string
            minLength: 5
        - name: limit
          in: query
          required: false
          description: Максимальное число результатов
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Результаты поиска, отсортированные по убыванию сходства
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/SearchResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  parameters:
    Sysname:
      name: sysname
      in: path
      required: true
      description: Системное имя списка
      schema:
        type: string
    RecordID:
      name: id
      in: path
      required: true
      description: Идентификатор записи
      schema:
        type: integer
        format: int64
  responses:
    BadRequest:
      description: Некорректный запрос (в т.ч. запрос короче 5 символов)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Список или запись не найдены
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Список с таким sysname уже существует
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    CreateListRequest:
      type: object
      required: [sysname]
      properties:
        sysname:
          type: string
          example: clients
        search_fields:
          type: array
          items:
            type: string
          example: [name, city]
    ListMeta:
      type: object
      properties:
        sysname:
          type: string
        search_fields:
          type: array
          items:
            type: string
    Record:
      type: object
      description: Плоский JSON-объект со скалярными значениями полей.
      additionalProperties: true
      example:
        name: "Иванов Иван"
        city: "Москва"
    RecordEnvelope:
      type: object
      properties:
        id:
          type: integer
          format: int64
        record:
          $ref: "#/components/schemas/Record"
    SearchResult:
      type: object
      properties:
        id:
          type: integer
          format: int64
        score:
          type: number
          format: double
          description: Сходство в диапазоне 0..1
        record:
          $ref: "#/components/schemas/Record"
    Error:
      type: object
      properties:
        error:
          type: string
